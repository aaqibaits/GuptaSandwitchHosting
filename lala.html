<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gupta Sandwich — Admin Panel</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/tabler-icons.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; }

    /* ── Layout ── */
    .app { display: flex; height: 100vh; background: #f4f4f2; }

    /* ── Sidebar ── */
    .sidebar { width: 210px; min-width: 210px; background: #1a1208; display: flex; flex-direction: column; }
    .sb-brand { padding: 18px 16px 14px; border-bottom: 0.5px solid rgba(255,255,255,0.08); }
    .sb-brand-name { font-size: 15px; font-weight: 600; color: #f5c842; }
    .sb-brand-sub { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 2px; }
    .nav-section { padding: 10px 0 4px; }
    .nav-label { font-size: 10px; color: rgba(255,255,255,0.25); letter-spacing: 1px; padding: 6px 16px 2px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px; cursor: pointer; font-size: 13px; color: rgba(255,255,255,0.5); border-left: 2px solid transparent; transition: all 0.12s; }
    .nav-item:hover { color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.04); }
    .nav-item.active { color: #f5c842; border-left-color: #f5c842; background: rgba(245,200,66,0.07); }
    .nav-item i { font-size: 16px; width: 18px; }
    .sb-foot { margin-top: auto; padding: 12px; }
    .role-pill { background: rgba(245,200,66,0.1); border: 0.5px solid rgba(245,200,66,0.25); border-radius: 7px; padding: 8px 10px; }
    .role-pill span { font-size: 12px; color: #f5c842; display: block; }
    .role-pill small { font-size: 10px; color: rgba(255,255,255,0.3); }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .topbar { background: #fff; border-bottom: 0.5px solid #e5e5e3; padding: 0 20px; height: 50px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .topbar-title { font-size: 14px; font-weight: 600; color: #1c1c1a; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .sel { font-size: 12px; padding: 5px 9px; border-radius: 6px; border: 0.5px solid #d8d8d5; background: #f4f4f2; color: #1c1c1a; cursor: pointer; }
    .avatar { width: 28px; height: 28px; border-radius: 50%; background: #f5c842; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #1a1208; }
    .content { flex: 1; overflow-y: auto; padding: 18px 20px; }

    /* ── Dashboard ── */
    .period-row { display: flex; gap: 6px; margin-bottom: 18px; }
    .pb { padding: 5px 13px; font-size: 12px; border-radius: 6px; border: 0.5px solid #d8d8d5; background: #fff; color: #666; cursor: pointer; transition: all 0.12s; }
    .pb.on { background: #1a1208; color: #f5c842; border-color: #1a1208; }
    .metrics { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 16px; }
    .mc { background: #eeeee9; border-radius: 9px; padding: 12px 14px; }
    .mc-label { font-size: 11px; color: #888; margin-bottom: 5px; }
    .mc-val { font-size: 22px; font-weight: 600; color: #1c1c1a; }
    .mc-sub { font-size: 11px; color: #aaa; margin-top: 2px; }

    /* ── Cards ── */
    .card { background: #fff; border: 0.5px solid #e5e5e3; border-radius: 10px; padding: 14px; margin-bottom: 14px; }
    .card-title { font-size: 13px; font-weight: 600; color: #1c1c1a; margin-bottom: 12px; }
    .card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }

    /* ── Dishes ── */
    .tab-row { display: flex; gap: 0; border-bottom: 0.5px solid #e5e5e3; margin-bottom: 16px; }
    .tab-btn { padding: 9px 16px; font-size: 13px; color: #888; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -0.5px; }
    .tab-btn.active { color: #c8970a; border-bottom-color: #c8970a; font-weight: 600; }
    .add-btn { background: #1a1208; color: #f5c842; border: none; border-radius: 7px; padding: 7px 14px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
    .dish-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
    .dish-card { background: #fff; border: 0.5px solid #e5e5e3; border-radius: 9px; padding: 12px; }
    .dish-name { font-size: 13px; font-weight: 600; color: #1c1c1a; margin-bottom: 3px; }
    .dish-cat { font-size: 11px; color: #aaa; margin-bottom: 7px; }
    .price-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 7px; }
    .ptag { font-size: 11px; background: #f4f4f2; border-radius: 4px; padding: 2px 7px; color: #555; }
    .outlet-chips { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
    .chip { font-size: 10px; background: rgba(245,200,66,0.15); color: #8a6c00; border-radius: 4px; padding: 2px 6px; }
    .icon-btn { padding: 4px 8px; border: 0.5px solid #e5e5e3; border-radius: 5px; background: #f4f4f2; cursor: pointer; font-size: 13px; color: #555; }
    .dish-actions { display: flex; gap: 5px; margin-top: 7px; }

    /* ── Modal ── */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 99; }
    .modal { background: #fff; border-radius: 12px; padding: 22px; width: 480px; max-height: 88vh; overflow-y: auto; position: relative; }
    .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: #1c1c1a; }
    .close-btn { position: absolute; top: 14px; right: 14px; background: none; border: none; font-size: 17px; cursor: pointer; color: #888; }
    .form-row { margin-bottom: 11px; }
    .form-label { font-size: 12px; color: #666; margin-bottom: 3px; display: block; }
    .fi { width: 100%; padding: 7px 9px; font-size: 13px; border: 0.5px solid #d8d8d5; border-radius: 6px; background: #fff; color: #1c1c1a; }
    .two-in { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .submit-btn { width: 100%; background: #1a1208; color: #f5c842; border: none; border-radius: 7px; padding: 9px; font-size: 13px; cursor: pointer; margin-top: 6px; font-weight: 600; }
    .cb-row { display: flex; align-items: center; gap: 7px; font-size: 12px; color: #1c1c1a; margin-bottom: 6px; }

    /* ── Reports ── */
    .report-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 16px; }
    .report-card { background: #fff; border: 0.5px solid #e5e5e3; border-radius: 9px; padding: 14px; cursor: pointer; transition: border-color 0.12s; }
    .report-card:hover { border-color: #1a1208; }
    .report-icon { font-size: 20px; color: #c8970a; margin-bottom: 7px; }
    .report-name { font-size: 13px; font-weight: 600; color: #1c1c1a; margin-bottom: 3px; }
    .report-desc { font-size: 11px; color: #aaa; }
    .report-badge { font-size: 10px; background: #FAEEDA; color: #633806; border-radius: 4px; padding: 2px 6px; display: inline-block; margin-top: 5px; }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { text-align: left; padding: 8px 12px; font-size: 11px; color: #888; border-bottom: 0.5px solid #e5e5e3; background: #f4f4f2; font-weight: 600; }
    td { padding: 9px 12px; border-bottom: 0.5px solid #e5e5e3; color: #1c1c1a; }
    tr:last-child td { border-bottom: none; }
    .tw { background: #fff; border: 0.5px solid #e5e5e3; border-radius: 9px; overflow: hidden; }

    /* ── Accounting ── */
    .status-badge { font-size: 11px; padding: 2px 7px; border-radius: 4px; }
    .s-paid { background: #EAF3DE; color: #3B6D11; }
    .s-pending { background: #FAEEDA; color: #633806; }
    .s-due { background: #FCEBEB; color: #791F1F; }

    /* ── Hidden ── */
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sb-brand">
      <div class="sb-brand-name">🥪 Gupta Sandwich</div>
      <div class="sb-brand-sub">Admin Panel</div>
    </div>
    <div class="nav-section">
      <div class="nav-label">MAIN</div>
      <div class="nav-item active" data-page="dashboard"><i class="ti ti-layout-dashboard"></i> Dashboard</div>
      <div class="nav-item" data-page="dishes"><i class="ti ti-soup"></i> Dishes</div>
      <div class="nav-item" data-page="reports"><i class="ti ti-chart-bar"></i> Reports</div>
      <div class="nav-item" data-page="accounting"><i class="ti ti-receipt"></i> Accounting</div>
    </div>
    <div class="sb-foot">
      <div class="role-pill">
        <span>Admin</span>
        <small>All outlets access</small>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div class="topbar-right">
        <select class="sel" id="outlet-filter">
          <option value="all">All Outlets</option>
          <option value="kp">Koregaon Park</option>
          <option value="baner">Baner</option>
          <option value="kothrud">Kothrud</option>
        </select>
        <div class="avatar">A</div>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- ── MODAL ── -->
<div class="modal-bg hidden" id="modal-bg">
  <div class="modal">
    <div class="modal-title">Add New Dish</div>
    <button class="close-btn" id="modal-close"><i class="ti ti-x"></i></button>
    <div class="form-row">
      <label class="form-label">Dish name</label>
      <input class="fi" type="text" placeholder="e.g. Chicken Club Sandwich">
    </div>
    <div class="form-row">
      <label class="form-label">Category</label>
      <select class="fi"><option>Sandwiches</option><option>Subs</option><option>Beverages</option><option>Snacks</option></select>
    </div>
    <div class="form-row">
      <label class="form-label">Offline pricing</label>
      <div class="two-in">
        <input class="fi" type="number" placeholder="Dine-in (₹)">
        <input class="fi" type="number" placeholder="Parcel (₹)">
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Online pricing</label>
      <div class="two-in">
        <input class="fi" type="number" placeholder="Swiggy (₹)">
        <input class="fi" type="number" placeholder="Zomato (₹)">
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Ingredients</label>
      <input class="fi" type="text" placeholder="Bread, Lettuce, Tomato, Mayo">
    </div>
    <div class="form-row">
      <label class="form-label">Outlets</label>
      <div class="cb-row"><input type="checkbox" checked> Add to all outlets</div>
      <div style="display:flex;gap:14px;padding-left:4px;">
        <label class="cb-row" style="margin-bottom:0;"><input type="checkbox"> Koregaon Park</label>
        <label class="cb-row" style="margin-bottom:0;"><input type="checkbox"> Baner</label>
        <label class="cb-row" style="margin-bottom:0;"><input type="checkbox"> Kothrud</label>
      </div>
    </div>
    <button class="submit-btn">Save Dish</button>
  </div>
</div>

<script>
  /* ───── Data ───── */
  const OUTLETS = ['Koregaon Park', 'Baner', 'Kothrud'];

  const DASH_DATA = {
    today:     [112, 84, 61],
    yesterday: [128, 97, 72],
    week:      [810, 612, 448],
    month:     [3420, 2580, 1920]
  };

  const DISHES = [
    { id:1, name:'Veg Club Sandwich', cat:'Sandwiches', dine:120, parcel:110, swiggy:140, zomato:140, ingredients:['Bread','Lettuce','Tomato','Mayo'], outlets:['All'] },
    { id:2, name:'Chicken Tikka Sub', cat:'Subs', dine:180, parcel:170, swiggy:210, zomato:210, ingredients:['Sub Roll','Chicken','Onion','Sauce'], outlets:['Koregaon Park','Baner'] },
    { id:3, name:'Paneer Griller', cat:'Sandwiches', dine:150, parcel:140, swiggy:175, zomato:175, ingredients:['Bread','Paneer','Capsicum','Mayo'], outlets:['All'] },
    { id:4, name:'Cold Coffee', cat:'Beverages', dine:80, parcel:80, swiggy:95, zomato:95, ingredients:['Milk','Coffee','Sugar','Ice'], outlets:['All'] },
    { id:5, name:'Egg Bhurji Sandwich', cat:'Sandwiches', dine:130, parcel:120, swiggy:150, zomato:150, ingredients:['Bread','Egg','Onion','Spices'], outlets:['Kothrud'] },
    { id:6, name:'Masala Chai', cat:'Beverages', dine:40, parcel:40, swiggy:null, zomato:null, ingredients:['Tea','Milk','Ginger','Cardamom'], outlets:['All'] },
  ];

  const ACCT_DATA = [
    { id:'TXN001', amount:'₹12,400', order:'12 May 2025', delivery:'13 May 2025', payment:'13 May 2025', bill:true, status:'paid' },
    { id:'TXN002', amount:'₹8,750', order:'14 May 2025', delivery:'15 May 2025', payment:'—', bill:false, status:'pending' },
    { id:'TXN003', amount:'₹21,000', order:'10 May 2025', delivery:'11 May 2025', payment:'11 May 2025', bill:true, status:'paid' },
    { id:'TXN004', amount:'₹5,600', order:'08 May 2025', delivery:'09 May 2025', payment:'—', bill:false, status:'due' },
    { id:'TXN005', amount:'₹14,200', order:'06 May 2025', delivery:'07 May 2025', payment:'07 May 2025', bill:true, status:'paid' },
  ];

  /* ───── State ───── */
  let currentPage = 'dashboard';
  let dishTab = 'offline';
  let activeChart = null;
  let dashPeriod = 'today';

  /* ───── Navigation ───── */
  document.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      el.classList.add('active');
      currentPage = el.dataset.page;
      const titles = { dashboard:'Dashboard', dishes:'Dishes', reports:'Reports', accounting:'Accounting' };
      document.getElementById('topbar-title').textContent = titles[currentPage];
      render();
    });
  });

  /* ───── Modal ───── */
  document.getElementById('modal-close').addEventListener('click', () => {
    document.getElementById('modal-bg').classList.add('hidden');
  });
  document.getElementById('modal-bg').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modal-bg'))
      document.getElementById('modal-bg').classList.add('hidden');
  });

  /* ───── Dashboard ───── */
  function renderDashboard() {
    const periods = [['today','Today'],['yesterday','Yesterday'],['week','Last week'],['month','Last month']];
    return `
      <div class="period-row">
        ${periods.map(([k,l]) => `<button class="pb ${dashPeriod===k?'on':''}" data-period="${k}">${l}</button>`).join('')}
      </div>
      <div class="metrics" id="dash-metrics"></div>
      <div class="card">
        <div class="card-title">Orders sold — by outlet</div>
        <div style="position:relative;width:100%;height:300px;">
          <canvas id="ordersChart"></canvas>
        </div>
      </div>
    `;
  }

  function buildDashChart(orders) {
    if (activeChart) { activeChart.destroy(); activeChart = null; }
    const total = orders.reduce((a,b)=>a+b,0);
    const topIdx = orders.indexOf(Math.max(...orders));
    document.getElementById('dash-metrics').innerHTML = `
      <div class="mc"><div class="mc-label">Total orders</div><div class="mc-val">${total}</div><div class="mc-sub">All outlets</div></div>
      <div class="mc"><div class="mc-label">Best outlet</div><div class="mc-val" style="font-size:16px;margin-top:4px;">${OUTLETS[topIdx]}</div><div class="mc-sub">${orders[topIdx]} orders</div></div>
      <div class="mc"><div class="mc-label">Avg per outlet</div><div class="mc-val">${Math.round(total/OUTLETS.length)}</div><div class="mc-sub">orders</div></div>
    `;
    activeChart = new Chart(document.getElementById('ordersChart'), {
      type: 'bar',
      data: {
        labels: OUTLETS,
        datasets: [{ data: orders, backgroundColor: ['#1a1208','#c8970a','#5DCAA5'], borderRadius: 6, barPercentage: 0.45 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.parsed.y + ' orders' } } },
        scales: {
          x: { grid: { display: false }, ticks: { color: '#888', font: { size: 13 } } },
          y: { grid: { color: 'rgba(0,0,0,0.06)' }, ticks: { color: '#888', font: { size: 12 } }, beginAtZero: true }
        }
      }
    });
  }

  /* ───── Dishes ───── */
  function renderDishes() {
    const list = dishTab === 'online' ? DISHES.filter(d => d.swiggy !== null) : DISHES;
    return `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <div class="tab-row" style="margin-bottom:0;border-bottom:none;">
          <div class="tab-btn ${dishTab==='offline'?'active':''}" data-tab="offline">Offline</div>
          <div class="tab-btn ${dishTab==='online'?'active':''}" data-tab="online">Online (Swiggy / Zomato)</div>
        </div>
        <button class="add-btn" id="open-modal"><i class="ti ti-plus"></i> Add dish</button>
      </div>
      <div class="dish-grid">
        ${list.map(d => `
          <div class="dish-card">
            <div class="dish-name">${d.name}</div>
            <div class="dish-cat">${d.cat}</div>
            ${dishTab==='offline' ? `
              <div class="price-row">
                <span class="ptag">Dine-in ₹${d.dine}</span>
                <span class="ptag">Parcel ₹${d.parcel}</span>
              </div>` : `
              <div class="price-row">
                <span class="ptag" style="background:#FFF3ED;color:#8a3800;">Swiggy ₹${d.swiggy}</span>
                <span class="ptag" style="background:#FDECED;color:#8a1c25;">Zomato ₹${d.zomato}</span>
              </div>`}
            <div style="font-size:11px;color:#aaa;">${d.ingredients.join(', ')}</div>
            <div class="outlet-chips">${d.outlets.map(o=>`<span class="chip">${o}</span>`).join('')}</div>
            <div class="dish-actions">
              <button class="icon-btn"><i class="ti ti-edit"></i></button>
              <button class="icon-btn" style="color:#c0392b;"><i class="ti ti-trash"></i></button>
            </div>
          </div>`).join('')}
      </div>
    `;
  }

  /* ───── Reports ───── */
  function renderReports() {
    const reports = [
      { icon:'ti-calendar-stats', name:'Daily sales report', desc:'Day-wise revenue breakdown' },
      { icon:'ti-cash', name:'Cash / online report', desc:'Payment mode analysis' },
      { icon:'ti-percentage', name:'GST report', desc:'Tax collected summary' },
      { icon:'ti-tag', name:'Category report', desc:'Sales by dish category' },
      { icon:'ti-clock', name:'Hourly report', desc:'Peak hours & rush analysis' },
      { icon:'ti-motorbike', name:'Swiggy / Zomato report', desc:'Delivery platform breakdown' },
      { icon:'ti-salad', name:'Food cost report', desc:'Ingredient cost vs revenue', badge:'Primary' },
    ];
    return `
      <div class="report-grid">
        ${reports.map(r => `
          <div class="report-card">
            <div class="report-icon"><i class="ti ${r.icon}"></i></div>
            <div class="report-name">${r.name}</div>
            <div class="report-desc">${r.desc}</div>
            ${r.badge ? `<div class="report-badge">★ ${r.badge}</div>` : ''}
          </div>`).join('')}
      </div>
      <div class="card">
        <div class="card-head">
          <div class="card-title" style="margin-bottom:0;">Daily sales — preview</div>
          <select class="sel"><option>All outlets</option>${OUTLETS.map(o=>`<option>${o}</option>`).join('')}</select>
        </div>
        <div class="tw">
          <table>
            <thead><tr><th>Date</th><th>Outlet</th><th>Offline</th><th>Online</th><th>Total</th><th>Orders</th></tr></thead>
            <tbody>
              <tr><td>16 May</td><td>Koregaon Park</td><td>₹8,400</td><td>₹4,200</td><td>₹12,600</td><td>82</td></tr>
              <tr><td>16 May</td><td>Baner</td><td>₹5,800</td><td>₹3,100</td><td>₹8,900</td><td>61</td></tr>
              <tr><td>16 May</td><td>Kothrud</td><td>₹4,200</td><td>₹2,750</td><td>₹6,950</td><td>45</td></tr>
              <tr style="background:#f4f4f2;font-weight:600;"><td colspan="2">Total</td><td>₹18,400</td><td>₹10,050</td><td>₹28,450</td><td>188</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    `;
  }

  /* ───── Accounting ───── */
  function renderAccounting() {
    const sm = { paid:'s-paid', pending:'s-pending', due:'s-due' };
    return `
      <div class="card-head" style="margin-bottom:14px;">
        <div style="font-size:14px;font-weight:600;color:#1c1c1a;">Accounting ledger</div>
        <div style="display:flex;gap:8px;">
          <select class="sel"><option>All outlets</option>${OUTLETS.map(o=>`<option>${o}</option>`).join('')}</select>
          <button class="add-btn"><i class="ti ti-plus"></i> Add entry</button>
        </div>
      </div>
      <div class="tw" style="margin-bottom:14px;">
        <table>
          <thead><tr><th>Txn ID</th><th>Amount</th><th>Order date</th><th>Delivery date</th><th>Payment date</th><th>Bill</th><th>Status</th></tr></thead>
          <tbody>
            ${ACCT_DATA.map(r => `
              <tr>
                <td style="color:#aaa;">${r.id}</td>
                <td style="font-weight:600;">${r.amount}</td>
                <td>${r.order}</td><td>${r.delivery}</td><td>${r.payment}</td>
                <td>${r.bill
                  ? `<span style="color:#3B6D11;"><i class="ti ti-photo"></i> Uploaded</span>`
                  : `<button style="font-size:11px;padding:3px 7px;border:0.5px dashed #d8d8d5;border-radius:4px;background:none;cursor:pointer;color:#aaa;">Upload</button>`
                }</td>
                <td><span class="status-badge ${sm[r.status]}">${r.status.charAt(0).toUpperCase()+r.status.slice(1)}</span></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div class="metrics">
        <div class="mc"><div class="mc-label">Total billed</div><div class="mc-val" style="font-size:18px;">₹61,950</div></div>
        <div class="mc"><div class="mc-label">Received</div><div class="mc-val" style="font-size:18px;color:#3B6D11;">₹47,600</div></div>
        <div class="mc"><div class="mc-label">Pending</div><div class="mc-val" style="font-size:18px;color:#A32D2D;">₹14,350</div></div>
      </div>
    `;
  }

  /* ───── Render ───── */
  function render() {
    const el = document.getElementById('content');
    if (currentPage === 'dashboard') {
      el.innerHTML = renderDashboard();
      // Period buttons
      el.querySelectorAll('.pb').forEach(btn => {
        btn.addEventListener('click', () => {
          dashPeriod = btn.dataset.period;
          el.querySelectorAll('.pb').forEach(b => b.classList.remove('on'));
          btn.classList.add('on');
          buildDashChart(DASH_DATA[dashPeriod]);
        });
      });
      setTimeout(() => buildDashChart(DASH_DATA[dashPeriod]), 0);
    } else if (currentPage === 'dishes') {
      el.innerHTML = renderDishes();
      el.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => { dishTab = btn.dataset.tab; render(); });
      });
      const openBtn = document.getElementById('open-modal');
      if (openBtn) openBtn.addEventListener('click', () => document.getElementById('modal-bg').classList.remove('hidden'));
    } else if (currentPage === 'reports') {
      el.innerHTML = renderReports();
    } else if (currentPage === 'accounting') {
      el.innerHTML = renderAccounting();
    }
  }

  render();
</script>
</body>
</html>
